<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background-color: #ecf0f3;
        font-family: sans-serif;
        outline: none;
    }
    .par{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;  
    }
    .child{
        background-color: #ecf0f3;
        padding: 15px; 
        border-radius: 30px;
         grid-template-columns: repeat(4,68px);
        box-shadow:inset 5px 5px 12px #ffffff,
                         5px 5px 12px rgba(0,0,0,.16);
        display: grid;
        grid-template-columns: repeat(4,68px);

    }
    input{
        grid-column: span 4;
        height: 70px;
        width: 260px;
        box-shadow: inset -5px -5px 12px #ffffff,
                    inset 5px 5px 12px rgba(0,0,0,.16);
        border: none;
        border-radius: 30px;
        color: rgb(70,70,70);
        font-size: 50px;
        text-align: end;
        padding: 20px;
        margin: auto;
        margin-top: 40px;
        margin-bottom: 30px;
    }
    button{
        border: none;
        height: 48px;
        cursor: pointer;

        width: 48px;
        background-color: #ecf0f3;
         box-shadow: inset -5px -5px 12px #ffffff,
                      5px 5px 12px rgba(0,0,0,.16);
        margin: 6px;
        border-radius: 50px;
       
    }
    .eq{
        width: 50px;
        background-color: rgb(84, 123, 123);
        box-shadow: none;
        font-size: 150%;
    }
</style>
<body>
   <div class="par">
    <div class="child">
        <input type="text" type="text" id="input">
    <button id="clear">C</button>
    <button id="del">DEL</button>
    <button  onclick="Displaybtnvalue('%')">%</button>
    <button  onclick="Displaybtnvalue('/')">/</button>
    <button  onclick="Displaybtnvalue('7')">7</button>
    <button  onclick="Displaybtnvalue('8')">8</button>
    <button  onclick="Displaybtnvalue('9')">9</button>
    <button  onclick="Displaybtnvalue('*')">*</button>
    <button  onclick="Displaybtnvalue('4')">4</button>
    <button  onclick="Displaybtnvalue('5')">5</button>
    <button  onclick="Displaybtnvalue('6')">6</button>
    <button  onclick="Displaybtnvalue('-')">-</button>
    <button  onclick="Displaybtnvalue('1')">1</button>
    <button  onclick="Displaybtnvalue('2')">2</button>
    <button  onclick="Displaybtnvalue('3')">3</button>
    <button  onclick="Displaybtnvalue('+')">+</button>
    <button  onclick="Displaybtnvalue('.')">.</button>
    <button  onclick="Displaybtnvalue('0')">0</button>
    <button  onclick="Displaybtnvalue('4')">4</button>
    <button class="eq" id="calculate">=</button>
    </div>
   </div>
</body>
<script>
    let output = document.getElementById("input")
    function Displaybtnvalue(value){
        output.value +=value
    }

    let del = document.getElementById("del")
    del.addEventListener("click",function(){
        output.value=output.value.slice(0,-1)
    })

    let cl = document.getElementById("clear")
    cl.addEventListener("click",function(){
        output.value="";
    })

   let eq=document.getElementById("calculate")
        eq.addEventListener("click",function(){
            output.value=eval(output.value)
    }) 

</script>
</html>
